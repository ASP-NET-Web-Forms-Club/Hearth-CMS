
<article class='term-doc layout-split'>
    <div class='wrap'>
        <div class='doc-grid'>
            <div class='doc-main'>
                <header class='doc-head'>
                    {{breadcrumbs}}
                    <span class='doc-cmd'>$ cat ./article.md</span>
                    <h1 class='doc-title'>{{article_title}}</h1>
                    <div class='doc-meta-row'>
                        {{published_date}}
                        {{updated_date}}
                        {{article_author}}
                    </div>
                </header>
                {{cover_image}}
                <div class='doc-content prose'>
                    {{article_content}}
                </div>
            </div>
            {{article_aside}}
        </div>
    </div>
</article>
