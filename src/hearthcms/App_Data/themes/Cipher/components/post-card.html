<article class='file-card'>
    <a href='{{post_url}}' class='fc-link'>
        <span class='fc-bar'><i class='fa-regular fa-file-code'></i> <span class='fc-name'>{{post_title}}</span></span>
        <span class='fc-body'>
            <span class='fc-excerpt'>{{post_excerpt}}</span>
            <span class='fc-meta'><span class='fc-key'>modified</span> {{post_date}}</span>
        </span>
    </a>
</article>
