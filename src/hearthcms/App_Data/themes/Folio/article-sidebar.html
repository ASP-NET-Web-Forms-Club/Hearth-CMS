
<article class='feature feature-split layout-split'>
    <div class='wrap'>
        <div class='feature-grid'>
            <div class='feature-main'>
                <header class='feature-head'>
                    {{breadcrumbs}}
                    <p class='kicker'>Feature</p>
                    <h1 class='feature-title'>{{article_title}}</h1>
                    <div class='feature-byline'>
                        {{published_date}}
                        {{updated_date}}
                        {{article_author}}
                    </div>
                </header>
                {{cover_image}}
                <div class='feature-content prose'>
                    {{article_content}}
                </div>
            </div>
            {{article_aside}}
        </div>
    </div>
</article>
