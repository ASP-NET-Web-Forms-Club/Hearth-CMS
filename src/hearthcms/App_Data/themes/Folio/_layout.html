<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1.0' />
    {{head_meta}}
    <link rel='stylesheet' href='/fonts/fontawesome/css/all.min.css' />
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=Archivo:wght@500;600;700&display=swap'>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css'>
    <link rel='stylesheet' href='/assets/themes/Folio/folio.css?v=2' />
</head>
<body>
<a class='skip-link' href='#main'>Skip to content</a>
<header class='masthead'>
    <div class='wrap mast-top'>
        <span class='mast-meta mast-left'>Est. MMXXVI</span>
        {{site_logo}}
        <span class='mast-meta mast-right'>The Edition</span>
        <button class='nav-toggle' onclick='toggleNav()' aria-label='Menu' aria-controls='siteNav'>
            <i class='fa-solid fa-bars'></i>
        </button>
    </div>
    <nav class='site-nav' id='siteNav'>
        {{nav_items}}
    </nav>
</header>
<div class='nav-overlay' id='navOverlay' onclick='toggleNav()'></div>
<main class='paper' id='main'>
{{body}}
</main>
<footer class='colophon'>
    <div class='wrap'>
        <div class='colo-cols'>{{footer_column_list}}</div>
        <div class='colo-line'>{{footer_text}}</div>
    </div>
</footer>
<script src='/js/site.js'></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js'></script>
<script>setTimeout(function(){document.querySelectorAll('pre code').forEach(function(el){try{hljs.highlightElement(el);}catch(e){}});},250);</script>
</body>
</html>
