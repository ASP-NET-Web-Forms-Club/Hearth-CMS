<article class='entry'>
    <a href='{{post_url}}' class='entry-link'>
        <span class='entry-rule'></span>
        <span class='entry-kicker'>Reading</span>
        <span class='entry-title'>{{post_title}}</span>
        <span class='entry-excerpt'>{{post_excerpt}}</span>
        <span class='entry-date'>{{post_date}}</span>
    </a>
</article>
