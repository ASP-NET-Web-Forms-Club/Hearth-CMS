
<article class='feature feature-stack layout-stack'>
    <div class='wrap wrap-narrow'>
        <header class='feature-head'>
            {{breadcrumbs}}
            <p class='kicker'>Feature</p>
            <h1 class='feature-title'>{{article_title}}</h1>
            <div class='feature-byline'>
                {{published_date}}
                {{updated_date}}
                {{article_author}}
            </div>
        </header>
        {{cover_image}}
        <div class='feature-content prose'>
            {{article_content}}
        </div>
    </div>
    <div class='wrap wrap-narrow'>
        {{article_aside}}
    </div>
</article>
