<article class='tile post-tile'>
    <a href='{{post_url}}' class='pt-link'>
        <span class='pt-glow'></span>
        <span class='pt-tag'>Post</span>
        <span class='pt-title'>{{post_title}}</span>
        <span class='pt-excerpt'>{{post_excerpt}}</span>
        <span class='pt-date'><i class='fa-regular fa-calendar'></i> {{post_date}}</span>
    </a>
</article>
