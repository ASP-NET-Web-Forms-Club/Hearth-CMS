
<article class='m-article layout-split'>
    <div class='wrap'>
        <div class='article-grid'>
            <div class='article-panel'>
                <header class='article-head'>
                    {{breadcrumbs}}
                    <h1 class='article-title'>{{article_title}}</h1>
                    <div class='article-meta'>
                        {{published_date}}
                        {{updated_date}}
                        {{article_author}}
                    </div>
                </header>
                {{cover_image}}
                <div class='article-content prose'>
                    {{article_content}}
                </div>
            </div>
            {{article_aside}}
        </div>
    </div>
</article>
