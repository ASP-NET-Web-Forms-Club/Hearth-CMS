<article class='doc doc-layout layout-split'>
    <div class='container'>
        <div class='doc-grid'>
            <div class='doc-main'>
                <header class='doc-header'>
                    {{breadcrumbs}}
                    <h1>{{article_title}}</h1>
                    <div class='doc-meta-row'>
                        {{published_date}}
                        {{updated_date}}
                        {{article_author}}
                    </div>
                </header>
                {{cover_image}}
                <div class='doc-content prose'>
                    {{article_content}}
                </div>
            </div>
            {{article_aside}}
        </div>
    </div>
</article>
